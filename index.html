<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Mrs.Skin</title>

    <meta
        name="description"
        content="Luxury beauty identity for skincare, aesthetics and wellness brands.">

    <meta
        name="theme-color"
        content="#d8d2cb">

    <!-- Open Graph -->
    <meta
        property="og:title"
        content="Mrs.Skin">

    <meta
        property="og:description"
        content="Luxury beauty identity for skincare, aesthetics and wellness brands.">

    <meta
        property="og:type"
        content="website">

    <meta
        property="og:url"
        content="https://mrs.skin">

    <meta
        property="og:image"
        content="https://mrs.skin/og-image.jpg">

    <!-- Twitter / X -->
    <meta
        name="twitter:card"
        content="summary_large_image">

    <meta
        name="twitter:title"
        content="Mrs.Skin">

    <meta
        name="twitter:description"
        content="Luxury beauty identity for skincare, aesthetics and wellness brands.">

    <meta
        name="twitter:image"
        content="https://mrs.skin/og-image.jpg">

    <!-- Favicons -->
    <link
        rel="icon"
        href="favicon.ico"
        sizes="any">

    <link
        rel="icon"
        type="image/svg+xml"
        href="favicon.svg">

    <link
        rel="apple-touch-icon"
        href="apple-touch-icon.png">

    <meta
        name="apple-mobile-web-app-title"
        content="Mrs.Skin">

    <style>

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg: #d8d2cb;
            --text: #171717;
            --muted: #5f5a56;
            --card: rgba(255,255,255,0.38);
            --border: rgba(0,0,0,0.08);
        }

        html,
        body {
            min-height: 100%;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 28px;

            overflow-x: hidden;
            overflow-y: auto;

            background:
                radial-gradient(
                    circle at top,
                    rgba(255,255,255,0.28),
                    transparent 42%
                ),
                radial-gradient(
                    circle at bottom,
                    rgba(255,255,255,0.12),
                    transparent 45%
                ),
                var(--bg);

            color: var(--text);

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                sans-serif;

            animation: fadeIn 1s ease;
        }

        body::after {
            content: "";

            position: fixed;
            inset: 0;

            pointer-events: none;

            opacity: 0.025;

            background-image:
                radial-gradient(
                    rgba(0,0,0,0.35) 0.5px,
                    transparent 0.5px
                );

            background-size: 3px 3px;
        }

        .container {
            position: relative;

            width: 100%;
            max-width: 520px;

            text-align: center;

            padding: 10px 0;
        }

        .logo-img {
            width: 100%;
            max-width: 300px;

            height: auto;

            display: block;

            margin:
                0 auto 42px;

            opacity: 0;

            transform: translateY(8px);

            animation:
                reveal 1s cubic-bezier(0.22,1,0.36,1) forwards,
                float 8s ease-in-out infinite 1s;
        }

        .description {
            margin:
                0 0 42px;

            color: var(--muted);

            font-size: 18px;

            line-height: 1.7;

            letter-spacing: 0.15px;

            opacity: 0;

            transform: translateY(6px);

            animation:
                reveal 1s ease forwards;

            animation-delay: 0.15s;
        }

        form {
            display: flex;
            flex-direction: column;

            gap: 18px;

            opacity: 0;

            transform: translateY(8px);

            animation:
                reveal 1s ease forwards;

            animation-delay: 0.3s;
        }

        input,
        textarea {
            width: 100%;

            padding: 20px 22px;

            border-radius: 24px;

            border:
                1px solid var(--border);

            background: var(--card);

            backdrop-filter: blur(10px);

            color: var(--text);

            font-size: 16px;

            font-family: inherit;

            transition:
                background 0.25s ease,
                border-color 0.25s ease,
                transform 0.25s ease,
                box-shadow 0.25s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color:
                rgba(0,0,0,0.42);
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;

            background:
                rgba(255,255,255,0.58);

            border-color:
                rgba(0,0,0,0.18);

            box-shadow:
                0 0 0 4px rgba(255,255,255,0.22);
        }

        button {
            margin-top: 4px;

            padding: 20px;

            border: none;
            border-radius: 24px;

            background:
                #23201d;

            color: #fff;

            font-size: 17px;
            font-weight: 500;

            font-family: inherit;

            cursor: pointer;

            transition:
                transform 0.25s ease,
                opacity 0.25s ease,
                box-shadow 0.25s ease;
        }

        button:hover {
            transform: translateY(-2px);

            box-shadow:
                0 14px 28px rgba(0,0,0,0.12);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: default;
        }

        .success {
            margin-top: 16px;

            padding: 18px;

            border-radius: 24px;

            background:
                rgba(255,255,255,0.42);

            border:
                1px solid rgba(0,0,0,0.08);

            color: #1a1a1a;

            font-size: 15px;
            font-weight: 500;

            opacity: 0;

            transform: translateY(6px);

            pointer-events: none;

            transition:
                opacity 0.35s ease,
                transform 0.35s ease;
        }

        .success.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .note {
            margin-top: 30px;

            color:
                rgba(0,0,0,0.42);

            font-size: 12px;

            letter-spacing: 1px;

            text-transform: uppercase;

            opacity: 0;

            animation:
                fadeOnly 1s ease forwards;

            animation-delay: 0.45s;
        }

        @keyframes reveal {

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOnly {

            to {
                opacity: 1;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {

            body {
                padding: 22px;
            }

            .logo-img {
                max-width: 250px;
                margin-bottom: 36px;
            }

            .description {
                margin-bottom: 36px;
                font-size: 16px;
            }

            input,
            textarea,
            button {
                font-size: 16px;
            }

            textarea {
                min-height: 140px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <img
        src="logo.png"
        alt="Mrs.Skin"
        class="logo-img"
        loading="eager"
        decoding="async">

    <p class="description">
        Luxury beauty identity for skincare,
        aesthetics and next-generation wellness brands.
    </p>

    <form id="offerForm">

        <input
            type="text"
            name="name"
            placeholder="Your Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Your Email"
            inputmode="email"
            required>

        <textarea
            name="message"
            placeholder="Your Offer or Message"
            required></textarea>

        <button
            type="submit"
            id="submitButton">
            Make an Offer
        </button>

    </form>

    <div
        class="success"
        id="successMsg">
        Thank you. Your inquiry has been received.
    </div>

    <div class="note">
        Available for strategic acquisition
    </div>

</div>

<script>

    const form =
        document.getElementById('offerForm');

    const button =
        document.getElementById('submitButton');

    const success =
        document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {

        e.preventDefault();

        button.disabled = true;

        button.textContent =
            'Sending...';

        const formData =
            new FormData(form);

        try {

            const response = await fetch(
                'https://formspree.io/f/mojbpoza',
                {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                }
            );

            if (response.ok) {

                form.reset();

                success.classList.add('visible');

                button.textContent =
                    'Inquiry Sent';

                setTimeout(() => {

                    success.classList.remove('visible');

                    button.disabled = false;

                    button.textContent =
                        'Make an Offer';

                }, 3200);

            } else {

                throw new Error();
            }

        } catch (error) {

            alert(
                'Unable to send inquiry.'
            );

            button.disabled = false;

            button.textContent =
                'Make an Offer';
        }

    });

</script>

</body>
</html>
